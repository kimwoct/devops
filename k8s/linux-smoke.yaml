apiVersion: apps/v1
kind: Deployment
metadata:
  name: linux-smoke
  labels:
    app: linux-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linux-smoke
  template:
    metadata:
      labels:
        app: linux-smoke
    spec:
      containers:
        - name: linux-smoke
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /www
              echo "hello from linux-smoke on Kubernetes" > /www/index.html
              httpd -f -p 8080 -h /www
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: linux-smoke
  labels:
    app: linux-smoke
spec:
  type: ClusterIP
  selector:
    app: linux-smoke
  ports:
    - name: http
      port: 80
      targetPort: http
