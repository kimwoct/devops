apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-live-stream
  labels:
    app: weather-live-stream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-live-stream
  template:
    metadata:
      labels:
        app: weather-live-stream
    spec:
      containers:
        - name: weather-live-stream
          image: weather-live-stream:local
          imagePullPolicy: IfNotPresent
          env:
            - name: ReverseProxy__Enabled
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: weather-live-stream
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: weather-live-stream
  labels:
    app: weather-live-stream
spec:
  type: ClusterIP
  selector:
    app: weather-live-stream
  ports:
    - name: http
      port: 80
      targetPort: http
