apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-nginx-config
  labels:
    app: weather-nginx
data:
  nginx.conf: |
    worker_processes auto;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      access_log /var/log/nginx/access.log;
      error_log /var/log/nginx/error.log warn;

      sendfile on;
      keepalive_timeout 65;

      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      upstream weather_live_stream {
        server weather-live-stream:80;
        keepalive 16;
      }

      server {
        listen 8080;
        server_name _;

        location = /nginx-health {
          access_log off;
          default_type text/plain;
          return 200 "ok\n";
        }

        location / {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Host $host;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_pass http://weather_live_stream;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-nginx
  labels:
    app: weather-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-nginx
  template:
    metadata:
      labels:
        app: weather-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: nginx-config
          configMap:
            name: weather-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: weather-nginx
  labels:
    app: weather-nginx
spec:
  type: ClusterIP
  selector:
    app: weather-nginx
  ports:
    - name: http
      port: 80
      targetPort: http
